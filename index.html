<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Weather App</title>


<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

.app{
width:400px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 10px 40px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-bottom:20px;
font-size:28px;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

.search button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:white;
}

.search button:hover{
background:#ddd;
}

.weather{
margin-top:20px;
display:none;
}

.weather img{
width:90px;
}

.temp{
font-size:50px;
font-weight:bold;
margin:10px 0;
}

.city{
font-size:22px;
}

.desc{
opacity:0.9;
margin-bottom:20px;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.stat{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:12px;
width:45%;
}

.loading{
display:none;
margin-top:10px;
}

.error{
color:#ffb3b3;
margin-top:10px;
display:none;
}

</style>
</head>


<body>

<div class="app">

<h1>🌤 Weather App</h1>

<div class="search">

<input id="cityInput" placeholder="Enter city">

<button onclick="getWeather()">Search</button>

<button onclick="getLocation()">📍</button>

</div>

<div class="loading" id="loading">Loading...</div>

<div class="error" id="error"></div>

<div class="weather" id="weatherBox">

<h2 class="city" id="cityName"></h2>

<img id="icon">

<div class="temp" id="temp"></div>

<div class="desc" id="desc"></div>

<div class="stats">

<div class="stat">
Humidity
<div id="humidity"></div>
</div>

<div class="stat">
Wind
<div id="wind"></div>
</div>

</div>

</div>

</div>

<script>

const API_KEY = "YOUR_API_KEY";

function getWeather(){

let city=document.getElementById("cityInput").value;

if(city===""){
showError("Please enter city name");
return;
}

fetchWeather(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`)

}

function getLocation(){

navigator.geolocation.getCurrentPosition(position=>{

let lat=position.coords.latitude
let lon=position.coords.longitude

fetchWeather(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`)

})

}

function fetchWeather(url){

document.getElementById("loading").style.display="block"
document.getElementById("error").style.display="none"

fetch(url)
.then(res=>res.json())
.then(data=>{

document.getElementById("loading").style.display="none"

if(data.cod!=200){
showError("City not found")
return
}

document.getElementById("weatherBox").style.display="block"

document.getElementById("cityName").innerText=
data.name + ", " + data.sys.country

document.getElementById("temp").innerText=
Math.round(data.main.temp)+"°C"

document.getElementById("desc").innerText=
data.weather[0].description

document.getElementById("humidity").innerText=
data.main.humidity+"%"

document.getElementById("wind").innerText=
data.wind.speed+" km/h"

document.getElementById("icon").src=
"https://openweathermap.org/img/wn/"+data.weather[0].icon+"@2x.png"

})

}

function showError(msg){

document.getElementById("error").innerText=msg
document.getElementById("error").style.display="block"

}

</script>

</body>
</html>
